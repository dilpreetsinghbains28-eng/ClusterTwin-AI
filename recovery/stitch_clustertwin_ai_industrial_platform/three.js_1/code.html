<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_1 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_1" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_1');
  const devicePixelRatio = window.devicePixelRatio || 1;
  
const scene = new THREE.Scene();
const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);
const directionalLight = new THREE.DirectionalLight(0x0D9488, 1);
directionalLight.position.set(5, 5, 5);
scene.add(directionalLight);

// Factory Platform (Base)
const baseGeo = new THREE.BoxGeometry(4, 0.2, 4);
const baseMat = new THREE.MeshPhongMaterial({ color: 0x1e293b, transparent: true, opacity: 0.8 });
const base = new THREE.Mesh(baseGeo, baseMat);
scene.add(base);

// Animated 'Smart' Elements (Representing MSME nodes)
const nodes = [];
const nodeGeo = new THREE.BoxGeometry(0.5, 1, 0.5);
const nodeMat = new THREE.MeshPhongMaterial({ color: 0x3B82F6 });

for(let i = 0; i < 5; i++) {
    const node = new THREE.Mesh(nodeGeo, nodeMat);
    node.position.x = (Math.random() - 0.5) * 3;
    node.position.z = (Math.random() - 0.5) * 3;
    node.position.y = 0.6;
    scene.add(node);
    nodes.push(node);
}

// Data flow lines (Simplified cylinders/lines)
const lineMat = new THREE.MeshBasicMaterial({ color: 0x0D9488, transparent: true, opacity: 0.4 });
const lineGeo = new THREE.CylinderGeometry(0.02, 0.02, 3);
const line = new THREE.Mesh(lineGeo, lineMat);
line.rotation.z = Math.PI / 2;
line.position.y = 1.5;
scene.add(line);

camera.position.set(5, 5, 5);
camera.lookAt(0, 0, 0);

function animate() {
    requestAnimationFrame(animate);
    
    nodes.forEach((node, i) => {
        node.position.y = 0.6 + Math.sin(Date.now() * 0.002 + i) * 0.2;
        node.rotation.y += 0.01;
    });
    
    line.rotation.y += 0.005;
    
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
});

animate();

})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_1 -->
</body>
</html>
