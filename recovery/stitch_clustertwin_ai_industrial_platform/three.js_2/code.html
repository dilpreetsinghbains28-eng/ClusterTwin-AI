<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_5 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_5" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_5');
  const devicePixelRatio = window.devicePixelRatio || 1;
  (function() {
  const container = document.getElementById('threejs-container-ANIMATION_1');
  const devicePixelRatio = window.devicePixelRatio || 1;
  
  const scene = new THREE.Scene();
  const width = container.clientWidth || window.innerWidth;
  const height = container.clientHeight || window.innerHeight;
  const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
  renderer.setSize(width, height);
  renderer.setPixelRatio(devicePixelRatio);
  container.appendChild(renderer.domElement);

  // Lighting
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(ambientLight);
  const directionalLight = new THREE.DirectionalLight(0x0D9488, 1);
  directionalLight.position.set(5, 5, 5);
  scene.add(directionalLight);

  // Raycaster for interactions
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  let hoveredNode = null;

  // Factory Platform (Base)
  const baseGeo = new THREE.BoxGeometry(4, 0.2, 4);
  const baseMat = new THREE.MeshPhongMaterial({ color: 0x1e293b, transparent: true, opacity: 0.8 });
  const base = new THREE.Mesh(baseGeo, baseMat);
  scene.add(base);

  // Animated 'Smart' Elements (Representing MSME nodes)
  const nodes = [];
  const nodeGeo = new THREE.BoxGeometry(0.5, 1, 0.5);
  
  for(let i = 0; i < 5; i++) {
    const nodeMat = new THREE.MeshPhongMaterial({ 
        color: 0x3B82F6,
        emissive: 0x3B82F6,
        emissiveIntensity: 0
    });
    const node = new THREE.Mesh(nodeGeo, nodeMat);
    node.position.x = (Math.random() - 0.5) * 3;
    node.position.z = (Math.random() - 0.5) * 3;
    node.position.y = 0.6;
    node.userData = { 
        originalY: 0.6, 
        originalColor: 0x3B82F6,
        phase: i,
        interactive: true
    };
    scene.add(node);
    nodes.push(node);
  }

  // Data flow lines
  const lineMat = new THREE.MeshBasicMaterial({ color: 0x0D9488, transparent: true, opacity: 0.4 });
  const lineGeo = new THREE.CylinderGeometry(0.02, 0.02, 3);
  const line = new THREE.Mesh(lineGeo, lineMat);
  line.rotation.z = Math.PI / 2;
  line.position.y = 1.5;
  scene.add(line);

  camera.position.set(5, 5, 5);
  camera.lookAt(0, 0, 0);

  function onMouseMove(event) {
    const rect = container.getBoundingClientRect();
    mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
  }

  function onClick(event) {
    if (hoveredNode) {
        // Pulse effect on click
        hoveredNode.scale.set(1.5, 1.5, 1.5);
        setTimeout(() => {
            if (hoveredNode) hoveredNode.scale.set(1.2, 1.2, 1.2);
            else nodes.forEach(n => n.scale.set(1, 1, 1));
        }, 150);
    }
  }

  window.addEventListener('mousemove', onMouseMove);
  window.addEventListener('click', onClick);

  function animate() {
    requestAnimationFrame(animate);
    
    // Raycasting
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(nodes);

    if (intersects.length > 0) {
        if (hoveredNode !== intersects[0].object) {
            if (hoveredNode) {
                hoveredNode.material.emissiveIntensity = 0;
                hoveredNode.scale.set(1, 1, 1);
            }
            hoveredNode = intersects[0].object;
            hoveredNode.material.emissiveIntensity = 0.5;
            hoveredNode.scale.set(1.2, 1.2, 1.2);
            container.style.cursor = 'pointer';
        }
    } else {
        if (hoveredNode) {
            hoveredNode.material.emissiveIntensity = 0;
            hoveredNode.scale.set(1, 1, 1);
            hoveredNode = null;
            container.style.cursor = 'default';
        }
    }

    const time = Date.now() * 0.001;
    nodes.forEach((node, i) => {
        // Combined floating animation with mouse reactive offset
        const targetY = node.userData.originalY + Math.sin(time * 2 + node.userData.phase) * 0.2;
        node.position.y = THREE.MathUtils.lerp(node.position.y, targetY, 0.1);
        
        node.rotation.y += 0.01;
        if (hoveredNode === node) {
            node.rotation.y += 0.05; // Faster rotation on hover
        }
    });
    
    line.rotation.y += 0.005;
    
    renderer.render(scene, camera);
  }

  window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  });

  animate();
})();
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_5 -->
</body>
</html>
