<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_19 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_19" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_19');
  const devicePixelRatio = window.devicePixelRatio || 1;
  
const scene = new THREE.Scene();
const containerWidth = container.clientWidth || window.innerWidth;
const containerHeight = container.clientHeight || window.innerHeight;
const camera = new THREE.PerspectiveCamera(60, containerWidth / containerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(containerWidth, containerHeight);
renderer.setPixelRatio(window.devicePixelRatio || 1);
container.appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);
const spotLight = new THREE.SpotLight(0x0D9488, 1.5);
spotLight.position.set(10, 20, 10);
spotLight.castShadow = true;
scene.add(spotLight);

// Factory Floor
const floorGeo = new THREE.PlaneGeometry(20, 20);
const floorMat = new THREE.MeshPhongMaterial({ 
    color: 0x0f172a, 
    transparent: true, 
    opacity: 0.5 
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

// Grid Helper
const grid = new THREE.GridHelper(20, 20, 0x0D9488, 0x1e293b);
grid.position.y = 0.01;
scene.add(grid);

// Production Line Modules (Simplified geometric representation)
const modules = [];
const createModule = (x, z, name) => {
    const group = new THREE.Group();
    
    // Base unit
    const baseGeo = new THREE.BoxGeometry(2, 1, 3);
    const baseMat = new THREE.MeshPhongMaterial({ color: 0x1e293b });
    const base = new THREE.Mesh(baseGeo, baseMat);
    group.add(base);

    // Glowing accents
    const glowGeo = new THREE.BoxGeometry(2.1, 0.1, 0.1);
    const glowMat = new THREE.MeshBasicMaterial({ color: 0x0D9488 });
    const glow = new THREE.Mesh(glowGeo, glowMat);
    glow.position.set(0, 0.5, 1.4);
    group.add(glow);

    // Rotating "gear" part
    const gearGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.5, 8);
    const gearMat = new THREE.MeshPhongMaterial({ color: 0x64748b });
    const gear = new THREE.Mesh(gearGeo, gearMat);
    gear.position.set(0, 0.8, -0.5);
    gear.rotation.z = Math.PI / 2;
    group.add(gear);

    group.position.set(x, 0.5, z);
    group.userData = { name, gear, originalColor: 0x1e293b };
    scene.add(group);
    modules.push(group);
};

createModule(-4, -2, "CNC Unit Alpha");
createModule(0, -2, "Extruder Beta");
createModule(4, -2, "Assembler Gamma");
createModule(-4, 4, "Quality Scanner");
createModule(4, 4, "Packing Node");

camera.position.set(12, 10, 12);
camera.lookAt(0, 0, 0);

// Interaction
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hovered = null;

container.addEventListener('mousemove', (e) => {
    const rect = container.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
});

function animate() {
    requestAnimationFrame(animate);
    
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(modules, true);

    if (intersects.length > 0) {
        let target = intersects[0].object;
        while(target.parent && !modules.includes(target)) target = target.parent;
        
        if (hovered !== target) {
            if (hovered) hovered.children[0].material.color.setHex(0x1e293b);
            hovered = target;
            hovered.children[0].material.color.setHex(0x0f766e);
            container.style.cursor = 'pointer';
        }
    } else {
        if (hovered) hovered.children[0].material.color.setHex(0x1e293b);
        hovered = null;
        container.style.cursor = 'default';
    }

    modules.forEach(m => {
        m.userData.gear.rotation.x += 0.05;
    });

    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
});

animate();

})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_19 -->
</body>
</html>
