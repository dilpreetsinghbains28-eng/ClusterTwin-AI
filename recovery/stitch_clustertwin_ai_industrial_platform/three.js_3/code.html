<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_7 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_7" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_7');
  const devicePixelRatio = window.devicePixelRatio || 1;
  (function() {
  const container = document.getElementById('threejs-container-ANIMATION_5');
  const devicePixelRatio = window.devicePixelRatio || 1;
  
  const scene = new THREE.Scene();
  const width = container.clientWidth || window.innerWidth;
  const height = container.clientHeight || window.innerHeight;
  const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
  renderer.setSize(width, height);
  renderer.setPixelRatio(devicePixelRatio);
  container.appendChild(renderer.domElement);

  // Lighting
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(ambientLight);
  const directionalLight = new THREE.DirectionalLight(0x0D9488, 1);
  directionalLight.position.set(5, 5, 5);
  scene.add(directionalLight);

  // Raycaster for interactions
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  let hoveredNode = null;

  // Factory Platform (Base)
  const baseGeo = new THREE.BoxGeometry(4, 0.2, 4);
  const baseMat = new THREE.MeshPhongMaterial({ color: 0x1e293b, transparent: true, opacity: 0.8 });
  const base = new THREE.Mesh(baseGeo, baseMat);
  scene.add(base);

  // Animated 'Smart' Elements (Representing MSME nodes)
  const nodes = [];
  const nodeGeo = new THREE.BoxGeometry(0.5, 1, 0.5);
  
  for(let i = 0; i < 5; i++) {
    const nodeMat = new THREE.MeshPhongMaterial({ 
        color: 0x3B82F6,
        emissive: 0x3B82F6,
        emissiveIntensity: 0
    });
    const node = new THREE.Mesh(nodeGeo, nodeMat);
    node.position.x = (Math.random() - 0.5) * 3;
    node.position.z = (Math.random() - 0.5) * 3;
    node.position.y = 0.6;
    node.userData = { 
        originalY: 0.6, 
        originalColor: 0x3B82F6,
        phase: i,
        interactive: true
    };
    scene.add(node);
    nodes.push(node);
  }

  // Animated Data Flow Lines
  const flowLines = [];
  const lineMat = new THREE.LineBasicMaterial({ color: 0x0D9488, transparent: true, opacity: 0.3 });
  
  // Create pulses/packets for flow
  const pulses = [];
  const pulseGeo = new THREE.SphereGeometry(0.04, 8, 8);
  const pulseMat = new THREE.MeshBasicMaterial({ color: 0x5EEAD4 });

  // Connect nodes in a web
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
        const points = [];
        points.push(nodes[i].position);
        points.push(nodes[j].position);
        
        const geometry = new THREE.BufferGeometry().setFromPoints(points);
        const line = new THREE.Line(geometry, lineMat);
        scene.add(line);
        flowLines.push({ line, startNode: nodes[i], endNode: nodes[j] });

        // Add a pulse for this connection
        const pulse = new THREE.Mesh(pulseGeo, pulseMat);
        pulse.userData = { 
            t: Math.random(), 
            speed: 0.002 + Math.random() * 0.005,
            start: nodes[i],
            end: nodes[j]
        };
        scene.add(pulse);
        pulses.push(pulse);
    }
  }

  camera.position.set(5, 5, 5);
  camera.lookAt(0, 0, 0);

  function onMouseMove(event) {
    const rect = container.getBoundingClientRect();
    mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
  }

  function onClick(event) {
    if (hoveredNode) {
        hoveredNode.scale.set(1.5, 1.5, 1.5);
        setTimeout(() => {
            if (hoveredNode) hoveredNode.scale.set(1.2, 1.2, 1.2);
        }, 150);
    }
  }

  window.addEventListener('mousemove', onMouseMove);
  window.addEventListener('click', onClick);

  function animate() {
    requestAnimationFrame(animate);
    
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(nodes);

    if (intersects.length > 0) {
        if (hoveredNode !== intersects[0].object) {
            if (hoveredNode) {
                hoveredNode.material.emissiveIntensity = 0;
                hoveredNode.scale.set(1, 1, 1);
            }
            hoveredNode = intersects[0].object;
            hoveredNode.material.emissiveIntensity = 0.5;
            hoveredNode.scale.set(1.2, 1.2, 1.2);
            container.style.cursor = 'pointer';
        }
    } else {
        if (hoveredNode) {
            hoveredNode.material.emissiveIntensity = 0;
            hoveredNode.scale.set(1, 1, 1);
            hoveredNode = null;
            container.style.cursor = 'default';
        }
    }

    const time = Date.now() * 0.001;
    nodes.forEach((node, i) => {
        const targetY = node.userData.originalY + Math.sin(time * 2 + node.userData.phase) * 0.2;
        node.position.y = THREE.MathUtils.lerp(node.position.y, targetY, 0.1);
        node.rotation.y += 0.01;
        if (hoveredNode === node) {
            node.rotation.y += 0.05;
        }
    });

    // Update lines and pulses
    flowLines.forEach(flow => {
        flow.line.geometry.setFromPoints([flow.startNode.position, flow.endNode.position]);
    });

    pulses.forEach(pulse => {
        pulse.userData.t += pulse.userData.speed;
        if (pulse.userData.t > 1) pulse.userData.t = 0;
        
        pulse.position.lerpVectors(pulse.userData.start.position, pulse.userData.end.position, pulse.userData.t);
        // Add a bit of glow based on time
        pulse.scale.setScalar(0.8 + Math.sin(time * 10) * 0.2);
    });
    
    renderer.render(scene, camera);
  }

  window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  });

  animate();
})();

})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_7 -->
</body>
</html>
