<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_9 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_9" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_9');
  const devicePixelRatio = window.devicePixelRatio || 1;
  
(function() {
  const container = document.getElementById('threejs-container-AUTH_BG');
  const devicePixelRatio = window.devicePixelRatio || 1;
  
  const scene = new THREE.Scene();
  const width = container.clientWidth || window.innerWidth;
  const height = container.clientHeight || window.innerHeight;
  const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
  renderer.setSize(width, height);
  renderer.setPixelRatio(devicePixelRatio);
  container.appendChild(renderer.domElement);

  // Lighting
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambientLight);
  const directionalLight = new THREE.DirectionalLight(0x0D9488, 1);
  directionalLight.position.set(10, 10, 10);
  scene.add(directionalLight);

  // Industrial Grid / Network
  const particles = new THREE.Group();
  scene.add(particles);

  const geometry = new THREE.SphereGeometry(0.05, 8, 8);
  const material = new THREE.MeshPhongMaterial({ color: 0x0D9488, emissive: 0x0D9488, emissiveIntensity: 0.5 });

  const count = 40;
  const nodes = [];
  for (let i = 0; i < count; i++) {
    const mesh = new THREE.Mesh(geometry, material);
    mesh.position.set(
      (Math.random() - 0.5) * 20,
      (Math.random() - 0.5) * 20,
      (Math.random() - 0.5) * 10 - 5
    );
    mesh.userData = {
      velocity: new THREE.Vector3(
        (Math.random() - 0.5) * 0.01,
        (Math.random() - 0.5) * 0.01,
        (Math.random() - 0.5) * 0.01
      )
    };
    particles.add(mesh);
    nodes.push(mesh);
  }

  // Connect nodes with lines if they are close
  const lineMat = new THREE.LineBasicMaterial({ color: 0x0D9488, transparent: true, opacity: 0.1 });
  const lineGeometry = new THREE.BufferGeometry();
  const linePositions = new Float32Array(count * count * 6);
  lineGeometry.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
  const lineMesh = new THREE.LineSegments(lineGeometry, lineMat);
  scene.add(lineMesh);

  camera.position.z = 15;

  function animate() {
    requestAnimationFrame(animate);
    
    let lineIdx = 0;
    const positions = lineMesh.geometry.attributes.position.array;

    nodes.forEach((node, i) => {
      node.position.add(node.userData.velocity);
      
      // Boundary check
      if (Math.abs(node.position.x) > 10) node.userData.velocity.x *= -1;
      if (Math.abs(node.position.y) > 10) node.userData.velocity.y *= -1;
      if (Math.abs(node.position.z + 5) > 5) node.userData.velocity.z *= -1;

      // Draw lines
      for (let j = i + 1; j < nodes.length; j++) {
        const dist = node.position.distanceTo(nodes[j].position);
        if (dist < 4) {
          positions[lineIdx++] = node.position.x;
          positions[lineIdx++] = node.position.y;
          positions[lineIdx++] = node.position.z;
          positions[lineIdx++] = nodes[j].position.x;
          positions[lineIdx++] = nodes[j].position.y;
          positions[lineIdx++] = nodes[j].position.z;
        }
      }
    });

    lineMesh.geometry.attributes.position.needsUpdate = true;
    lineMesh.geometry.setDrawRange(0, lineIdx / 3);
    
    particles.rotation.y += 0.001;
    particles.rotation.x += 0.0005;

    renderer.render(scene, camera);
  }

  window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  });

  animate();
})();

})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_9 -->
</body>
</html>
